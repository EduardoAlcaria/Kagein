services:
  python-findmy-service:
    build: ./python-findmy-service
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - findmy_sessions:/data/sessions
    environment:
      - COOKIE_ROOT=/data/sessions
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:?set INTERNAL_SERVICE_TOKEN in your shell or a .env file}

  postgres:
    image: postgres:17-alpine
    environment:
      - POSTGRES_DB=findmy
      - POSTGRES_USER=findmy
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in your shell or a .env file}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

volumes:
  findmy_sessions:
  postgres_data:
