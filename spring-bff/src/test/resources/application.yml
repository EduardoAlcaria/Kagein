# Default dashboard credentials for tests that boot the full app context but don't
# care about auth (e.g. SpringBffApplicationTests). SecurityConfigTest overrides these
# via @TestPropertySource to exercise real login behavior.
dashboard:
  username: test
  password-hash: "$2b$12$VpWzC70E7trgMpdIAIkigec3g4mw3/ranR5b42nXnhEK0raSjE5Tm"

# Placeholder values for tests that boot the full app context (PythonFindMyClient is a
# @Component with required @Value properties). PythonFindMyClientTest itself constructs
# the client directly and never reads these.
python-findmy-service:
  base-url: http://python-findmy-service:8000
  internal-token: test-token

# CredentialCipher is a @Component with a required @Value; any test that boots the
# full context (SpringBffApplicationTests, SecurityConfigTest) needs a valid 32-byte
# base64 key here or the SecretKeySpec constructor throws on an empty decoded array.
credential:
  encryption-key: MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE=
